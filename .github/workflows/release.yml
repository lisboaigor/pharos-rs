name: Release

on:
  push:
    tags:
      - "pharos-*-v[0-9]*"    # e.g. pharos-core-v1.2.3
      - "v[0-9]*"              # workspace-level release tag

permissions:
  contents: write

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnot/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build and test (release profile)
        run: |
          docker info || (echo "Docker required for integration tests" && exit 1)
          cargo test --workspace --all-features --release -- --test-threads=1

      - name: Publish pharos-core
        if: startsWith(github.ref_name, 'pharos-core-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-macros
        if: startsWith(github.ref_name, 'pharos-macros-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-macros --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-app
        if: startsWith(github.ref_name, 'pharos-app-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-app --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-infra
        if: startsWith(github.ref_name, 'pharos-infra-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-infra --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-postgres
        if: startsWith(github.ref_name, 'pharos-postgres-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-postgres --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-redis
        if: startsWith(github.ref_name, 'pharos-redis-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-redis --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos-testing
        if: startsWith(github.ref_name, 'pharos-testing-v') || startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos-testing --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish pharos (meta-crate)
        if: startsWith(github.ref_name, 'v')
        run: cargo publish -p pharos --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub release
        if: startsWith(github.ref_name, 'v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
